site_name: 📓 My Notes
site_description: Personal programming notes and cheatsheets
site_author: Tanim

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Python:
    - Overview: python/index.md
    - Basics:
      - Data Types & Keywords: python/basics/data-types.md
      - Operators: python/basics/operators.md
      - Input & Type Casting: python/basics/input-casting.md
      - Strings: python/basics/strings.md
      - Conditional Statements: python/basics/conditionals.md
      - Loops: python/basics/loops.md
      - Functions & Recursion: python/basics/functions.md
      - File I/O: python/basics/file-io.md
    - Data Structures:
      - Lists: python/data-structures/lists.md
      - Tuples: python/data-structures/tuples.md
      - Dictionaries: python/data-structures/dictionaries.md
      - Sets: python/data-structures/sets.md
    - OOP:
      - Classes & Objects: python/oops/classes-objects.md
      - Methods: python/oops/methods.md
      - Encapsulation: python/oops/encapsulation.md
      - Inheritance & Polymorphism: python/oops/inheritance-polymorphism.md
  - JavaScript:
    - Overview: javascript/index.md
  - C:
    - Overview: c/index.md
  - C++:
    - Overview: cpp/index.md